<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Brief Tool - KBT</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Londrina+Solid:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#e0e0e0; font-family:'Londrina Solid',cursive; padding:20px; }
.container { max-width:860px; margin:0 auto; }
header { background:linear-gradient(135deg,#e91e63,#c2185b); border-radius:12px; padding:24px; margin-bottom:24px; text-align:center; }
header h1 { font-family:'Luckiest Guy',cursive; font-size:36px; color:#fff; margin-bottom:4px; }
header p { color:rgba(255,255,255,0.8); font-size:16px; }
.card { background:#16213e; border-radius:12px; padding:24px; margin-bottom:16px; }
.card h2 { color:#e91e63; font-size:20px; margin-bottom:16px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
label { font-size:14px; color:#aaa; }
input, textarea, select {
  background:#0f3460; border:2px solid #e91e63; border-radius:8px;
  padding:10px 14px; color:#fff; font-family:'Londrina Solid',cursive; font-size:15px;
}
input::placeholder, textarea::placeholder { color:#666; }
textarea { height:80px; resize:vertical; }
.btn {
  background:linear-gradient(135deg,#e91e63,#c2185b); color:#fff; border:none;
  padding:14px 28px; border-radius:10px; font-size:18px; font-family:'Luckiest Guy',cursive;
  cursor:pointer; width:100%; letter-spacing:1px; margin-top:8px; transition:opacity .2s;
}
.btn:disabled { opacity:.5; cursor:not-allowed; }
.result-card { background:#0f3460; border-radius:12px; padding:24px; margin-top:16px; display:none; }
.result-card.active { display:block; }
.result-card h3 { color:#e91e63; margin-bottom:12px; font-size:18px; }
.script { white-space:pre-wrap; line-height:1.8; font-size:15px; color:#e0e0e0; font-family:Georgia,serif; }
.copy-btn {
  background:#e91e63; color:#fff; border:none; padding:8px 16px;
  border-radius:6px; cursor:pointer; font-size:13px; margin-top:12px; font-family:'Londrina Solid',cursive;
}
.status { color:#e91e63; font-size:14px; margin-top:8px; min-height:20px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎤 Host Brief Generator</h1>
    <p>Generate a punchy, ready-to-read host script for tonight's trivia</p>
  </header>

  <div class="card">
    <h2>Tonight's Event Details</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Event Name</label>
        <input type="text" id="eventName" placeholder="Kow Brainer Tuesday Night Trivia">
      </div>
      <div class="form-group">
        <label>Venue</label>
        <input type="text" id="venue" placeholder="The Local Hotel">
      </div>
      <div class="form-group">
        <label>Number of Rounds</label>
        <input type="number" id="rounds" value="6" min="1" max="12">
      </div>
      <div class="form-group">
        <label>Questions Per Round</label>
        <input type="number" id="questionsPerRound" value="5" min="3" max="10">
      </div>
      <div class="form-group full">
        <label>Special Rounds Tonight (e.g. Face Morph, SoundMash, Picture Round)</label>
        <input type="text" id="specialRounds" placeholder="Face Morph Round 3, SoundMash Round 5">
      </div>
      <div class="form-group full">
        <label>Prizes / Notes for Host</label>
        <textarea id="prizes" placeholder="1st place: $100 bar tab, 2nd: $50, wooden spoon: free schooner..."></textarea>
      </div>
    </div>
    <div class="status" id="status"></div>
    <button class="btn" id="generateBtn" onclick="generateBrief()">🎤 Generate Host Brief</button>
  </div>

  <div class="result-card" id="resultCard">
    <h3>📋 Tonight's Host Script</h3>
    <div class="script" id="scriptOutput"></div>
    <button class="copy-btn" onclick="copyScript()">📋 Copy Script</button>
  </div>
</div>

<script>
async function generateBrief() {
  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '✍️ Writing your brief...';

  const payload = {
    tool: 'host-brief',
    event_name: document.getElementById('eventName').value || 'Kow Brainer Trivia Night',
    venue: document.getElementById('venue').value || 'tonight\'s venue',
    rounds: document.getElementById('rounds').value,
    questions_per_round: document.getElementById('questionsPerRound').value,
    special_rounds: document.getElementById('specialRounds').value || null,
    prizes: document.getElementById('prizes').value || null,
  };

  try {
    const res = await fetch('/api/ai-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    document.getElementById('scriptOutput').textContent = data.result;
    document.getElementById('resultCard').classList.add('active');
    status.textContent = '✅ Brief ready!';
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

function copyScript() {
  navigator.clipboard.writeText(document.getElementById('scriptOutput').textContent);
  event.target.textContent = '✅ Copied!';
  setTimeout(() => event.target.textContent = '📋 Copy Script', 2000);
}
</script>
</body>
</html>
